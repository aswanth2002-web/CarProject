<!DOCTYPE html>
<html lang="en">
<head>
    {%load static%}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
       <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
       <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
     <link rel="stylesheet" href="{% static 'css/wishdisplay.css'%}" />
</head>
<body>
    <nav>
          <div class="home-nav">
            <a href="/appcar/first/">Home</a>
              <a href="/appcar/login/">Login</a>
              <a href="/appcar/regi/">SignIn</a>
              <a href="/appcar/carregi/">Upload cars</a>
               <a href="/appcar/wishdisplay/">Wishlist</a>
             </div>
    </nav>
 <div class="main-container">
    <div class="wrapper">
        <div class="row">
            {% for i in db %}
            <div class="col-md-4 col-sm-6 col-lg-3">
                <div class="card">
                    <img src="{{i.item.carimg.url}}" alt="">
                    <div class="info">
                       <p> {{i.item.carname}}</p>
                       <p> {{i.item.carprice}}</p>
                        <p>{{i.item.cardesc}}</p>
                       
                       <a href="/appcar/wishdelete/{{i.id}}"> <i class="fa-solid fa-trash"></i></a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</div>

    
   
    
</body>
</html>
