<!DOCTYPE html>
<html lang="en">
<head>
    {%load static%}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
       <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
     <link rel="stylesheet" href="{% static 'css/register.css'%}" />
</head>
<body>
    <div class="main-container">
        <h1>REGISTER</h1>
        <div class="form-container">
        <form action="" method='post' enctype='multipart/form-data'>{% csrf_token %}
        <label for="">Enter Your Name</label><br>
        <input type="text" name='username'><br><br>
         <label for="">Enter Your Email</label><br>
        <input type="email" name='useremail'><br><br>
         <label for="">Enter Your Phone Number</label><br>
        <input type="number" name='userphone'><br><br>
         <label for="">Enter Your Photo</label><br>
        <input type="file" name='userimg'><br><br>
         <label for="">Enter Your Password</label><br>
        <input type="password" name='userpass'><br><br>
         <label for="">Confirm Your Password</label><br>
        <input type="password" name='usercpass'><br><br>
        <input type="submit">
        </form>
        </div>
    </div>
   
</body>
</html>
