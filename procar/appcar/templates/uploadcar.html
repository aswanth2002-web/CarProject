<!DOCTYPE html>
<html lang="en">
<head>
    {%load static%}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
     <link rel="stylesheet" href="{% static 'css/uploadcar.css'%}" />
</head>
<body>
   
   <div class="form-main">
    <div class="upload-container">
     <h1>UPLOAD CARS</h1>
   </div>
    <form action="" method="post" enctype="multipart/form-data">{% csrf_token %}
     <div class="box-con">
        <div class="item">
        <label for="">Car Name</label><br>
        <input type="text" name="carname">
        </div>
        <div class="item">
        <label for="">Car Image</label><br>
        <input type="file" name="carimg"><br>
        </div>
        <div class="item">
        <label for="">Year </label><br>
        <input type="number" name="caryear">
        </div>
         <div class="item">
        <label for="">Month</label><br>
        <input type="text" name="carmonth">
         </div>
        <div class="item">
        <label for="">Car Model</label><br>
        <input type="text" name="carmodel">
        </div>
        <div class="item">
        <label for="">Color</label><br>
        <input type="text" name="carcolor">
        </div>
        <div class="item">
        <label for="">Fuel Selection</label><br>
        <select name="carfuel">
            <option value="">--selectcar--</option>
            <option value="Desiel">desiel</option>
            <option value="Petrol">petrol</option>
            <option value="Others">others</option>
        </select>
        </div>
    </div>
        {% comment %}  {% endcomment %}
<div class="box-con2">
         <div class="item">
        <label for="">Car Version</label><br>
        <input type="text" name="carversion">
        </div>
          <div class="item">
        <label for="">Alternate Fuel</label><br>
        <select name="caralter">
            <option value="">--selectcar--</option>
            <option value="CNG">CNG</option>
            <option value="LPG">Lpg</option>
            <option value="NONE">none</option>
        </select>
          </div>
            <div class="item">
            <label for="">Car Kilometers</label><br>
           <input type="number" name="carkilo">
            </div>
       <div class="item">
         <label for="">Owner</label><br>
        <select name="carowner">
            <option value="">--select--</option>
            <option value="First owner">first owner</option>
            <option value="Second owner">second owner</option>
            <option value="Third owner">third owner</option>
            <option value="Four or more owner">four or more owner</option>
        </select>
       </div>
       <div class="item">
        <label for="">Car Description</label><br>
        <input type="text" name="cardesc"><br>
       </div>
        <div class="item">
            <label for="">Selling Prize</label><br>
        <input type="number" name="carprice"><br>
        </div>
        <div class="item">
       <label for="">Car Category</label><br>
    <select name="carcate" required>
    <option value="">--Select--</option>
    <option value="Coupe">Coupe</option>
    <option value="Sports">Sports</option>
    <option value="Sedan">Sedan</option>
    <option value="Wagon">Wagon</option>
    <option value="Xuv">Xuv</option>
    </select>
</div>
        {% comment %}  {% endcomment %}
       <div class="item">
        <button type="submit">upload</button>
       </div>
       
    </form>
     </div>
   </div>
</body>
</html>
