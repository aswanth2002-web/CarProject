<!DOCTYPE html>
<html lang="en">
<head>
     {%load static%}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
       <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
     <link rel="stylesheet" href="{% static 'css/sedan.css'%}" />
</head>
<body>
<div class="main-carousel ">
    <div class="list">
      {% for i in car %}
      <div class="item">
             <img src="{{i.carimg.url}}" alt="">
        <div class="content">
          <div class="cate">{{i.carcate}}</div>
          <div class="title">{{i.carname}}</div>
          <div class="price">$ {{i.carprice}}</div>
       <div class="desc">{{i.cardesc}}</div>
       <div class="car-button">
         <button><a href="http://127.0.0.1:8000/appcar/details/{{i.id}}">seemore</a></button>
        <button><a href="http://127.0.0.1:8000/appcar/addwish/{{i.id}}">wish</a></button>
       </div>
        </div>
      </div>
      {% endfor %}
    </div>
    {% comment %} thumbnail division {% endcomment %}
    <div class="thumbnail">
      {% for i in car %}
      <div class="item">
        <img src="{{i.carimg.url}}" alt="">
        <div class="content">
          <div class="title">{{i.carname}}</div>
          <div class="desc">{{i.carcate}}</div>
        </div>
      </div>
      {% endfor %}
    </div>
    <div class="arrow">
      <button id="rev"><</button>
      <button id="next">></button>

    </div>
   </div>

    <script src="{% static 'js/sedan.js' %}"></script>

</body>
</html>
